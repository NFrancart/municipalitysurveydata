<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klimatiltag</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;line-height:1.6;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3}
.login-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:2.5rem 2rem;width:340px;text-align:center}
.login-card h1{font-size:20px;font-weight:500;margin-bottom:0.5rem}
.login-card p{font-size:13px;color:#666;margin-bottom:1.5rem}
.login-card input{width:100%;padding:10px 12px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;margin-bottom:0.75rem;outline:none}
.login-card input:focus{border-color:#888}
.login-card button{width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.login-card button:hover{background:#333}
.login-error{color:#c0392b;font-size:13px;margin-top:0.5rem;display:none}
#app{display:none;min-height:100vh}
header{background:#fff;border-bottom:0.5px solid #ddd;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:500}
header span{font-size:13px;color:#888}
.layout{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:260px;min-width:260px;background:#fff;border-right:0.5px solid #ddd;padding:1.25rem;overflow-y:auto}
.sidebar h2{font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#888;margin-bottom:1rem}
.filter-group{margin-bottom:1.5rem}
.filter-group h3{font-size:13px;font-weight:500;color:#444;margin-bottom:0.5rem}
.checkbox-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;cursor:pointer}
.checkbox-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#1a1a1a}
.main{flex:1;padding:1.5rem 2rem;overflow-y:auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.toolbar input[type=text]{padding:8px 12px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;width:260px;outline:none}
.toolbar input:focus{border-color:#888}
.results-count{font-size:13px;color:#888}
.actions-grid{display:flex;flex-direction:column;gap:10px}
.action-card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s}
.action-card:hover{border-color:#999}
.action-card h3{font-size:14px;font-weight:500;margin-bottom:4px}
.action-card .municipality{font-size:12px;color:#888}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-tilpasning{background:#E1F5EE;color:#0F6E56}
.badge-reduktion{background:#E6F1FB;color:#185FA5}
.badge-begge{background:#EEEDFE;color:#3C3489}
.badge-status{background:#f1efe8;color:#5f5e5a}
.badge-prioritet{background:#FAEEDA;color:#633806}
.no-results{text-align:center;color:#888;padding:3rem;font-size:14px}
.loading{text-align:center;color:#888;padding:3rem;font-size:14px}
.error-msg{text-align:center;color:#c0392b;padding:3rem;font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;overflow-y:auto;padding:2rem}
.modal-overlay.open{display:block}
.modal-wrap{display:flex;align-items:flex-start;justify-content:center;min-height:100%}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;padding:2rem;position:relative;margin:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:0.5px solid #ccc;border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer;color:#555}
.modal-close:hover{background:#f5f5f3}
.modal h2{font-size:17px;font-weight:500;margin-bottom:0.25rem}
.modal-sub{font-size:13px;color:#888;margin-bottom:1rem}
.section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:#aaa;margin:1.25rem 0 0.5rem}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:#f9f9f7;border-radius:8px;padding:0.75rem 1rem}
.detail-item .label{font-size:11px;color:#999;margin-bottom:2px}
.detail-item .value{font-size:13px;color:#1a1a1a;line-height:1.4}
.detail-full{grid-column:1/-1}
.detail-long{background:#f9f9f7;border-radius:8px;padding:0.75rem 1rem;margin-bottom:8px}
.detail-long .label{font-size:11px;color:#999;margin-bottom:4px}
.detail-long .value{font-size:13px;color:#1a1a1a;line-height:1.5}
.muni-section{background:#eef2ff;border-radius:8px;padding:1rem;margin-top:0.5rem}
.muni-section .label{font-size:11px;color:#5a6aaa;margin-bottom:2px}
.muni-section .value{font-size:13px;color:#1a1a1a}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>Klimatiltag</h1>
    <p>Indtast adgangskode for at fortsætte</p>
    <input type="password" id="pw-input" placeholder="Adgangskode" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button onclick="tryLogin()">Log ind</button>
    <div class="login-error" id="login-error">Forkert adgangskode. Prøv igen.</div>
  </div>
</div>

<div id="app">
  <header>
    <h1>Klimatiltag — Overblik</h1>
    <span id="header-sub">Kommunale klimadata</span>
  </header>
  <div class="layout">
    <div class="sidebar">
      <h2>Filtre</h2>
      <div class="filter-group"><h3>Type</h3><div id="filter-type"></div></div>
      <div class="filter-group"><h3>Status</h3><div id="filter-status"></div></div>
      <div class="filter-group"><h3>Prioriteret</h3><div id="filter-prioritet"></div></div>
      <div class="filter-group"><h3>Sektor</h3><div id="filter-sektor"></div></div>
      <div class="filter-group"><h3>Klimafarer</h3><div id="filter-klimafarer"></div></div>
      <div class="filter-group"><h3>Kommune</h3><div id="filter-municipality"></div></div>
    </div>
    <div class="main">
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Søg efter tiltag..." oninput="renderActions()"/>
        <span class="results-count" id="results-count"></span>
      </div>
      <div class="actions-grid" id="actions-grid"><div class="loading">Indlæser data...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="maybeClose(event)">
  <div class="modal-wrap">
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<script>
const PASS = "klima2025";
const ACTIONS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgKh2cE6-yUH8s1maftTT3G-M_EIyBGMgK7_5Wp_rBKa_HGGr52bTx5pJ4UUh89MSv8jP7t-Zz5hRP/pub?gid=0&single=true&output=csv";
const MUNIS_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgKh2cE6-yUH8s1maftTT3G-M_EIyBGMgK7_5Wp_rBKa_HGGr52bTx5pJ4UUh89MSv8jP7t-Zz5hRP/pub?gid=830274496&single=true&output=csv";

let actions = [], municipalities = [];
let activeFilters = {type:[],status:[],prioritet:[],sektor:[],klimafarer:[],municipality:[]};

function tryLogin() {
  if (document.getElementById("pw-input").value === PASS) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadData();
  } else {
    const err = document.getElementById("login-error");
    err.style.display = "block";
    setTimeout(() => err.style.display = "none", 3000);
  }
}

async function fetchCsv(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  const text = await res.text();
  return new Promise((resolve, reject) => {
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

async function loadData() {
  const grid = document.getElementById("actions-grid");
  try {
    grid.innerHTML = '<div class="loading">Henter data fra Google Sheets...</div>';
    [actions, municipalities] = await Promise.all([fetchCsv(ACTIONS_URL), fetchCsv(MUNIS_URL)]);
    document.getElementById("header-sub").textContent =
      `${municipalities.length} kommuner · ${actions.length} tiltag`;
    buildFilters();
    renderActions();
  } catch(e) {
    grid.innerHTML = `<div class="error-msg">Kunne ikke hente data.<br><small style="color:#999">${e.message}</small></div>`;
    console.error("Full error:", e);
  }
}

function unique(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function col(a, ...keys) {
  for (const k of keys) { if (a[k] !== undefined && a[k] !== "") return a[k]; }
  return "";
}

function buildFilters() {
  const f = (key, ...cols) => unique(actions.map(a => col(a, ...cols)));
  renderCheckboxes("filter-type",         f("type","3.4-reduktion-tilpasning-begge"), "type");
  renderCheckboxes("filter-status",       f("status","3.3b-status"),                  "status");
  renderCheckboxes("filter-prioritet",    f("pri","3.2-prioriteret"),                 "prioritet");
  renderCheckboxes("filter-sektor",       f("sek","3.5a-sektor_u"),                   "sektor");
  renderCheckboxes("filter-klimafarer",   f("kf","3.6a-klimafarer_u"),                "klimafarer");
  renderCheckboxes("filter-municipality", unique(actions.map(a => a.Municipality || a.municipality || "")), "municipality");
}

function renderCheckboxes(id, vals, key) {
  document.getElementById(id).innerHTML = vals.map(v =>
    `<label class="checkbox-item"><input type="checkbox" value="${v}" onchange="toggleFilter('${key}','${encodeURIComponent(v)}')"/> ${v}</label>`
  ).join("");
}

function toggleFilter(key, val) {
  val = decodeURIComponent(val);
  const arr = activeFilters[key];
  const i = arr.indexOf(val);
  if (i === -1) arr.push(val); else arr.splice(i, 1);
  renderActions();
}

function getMuni(a) { return a.Municipality || a.municipality || ""; }
function getType(a) { return col(a,"3.4-reduktion-tilpasning-begge"); }
function getStatus(a) { return col(a,"3.3b-status"); }
function getPri(a) { return col(a,"3.2-prioriteret"); }
function getSektor(a) { return col(a,"3.5a-sektor_u"); }
function getFare(a) { return col(a,"3.6a-klimafarer_u"); }
function getTitel(a) { return col(a,"3.1-titel"); }
function getDesc(a) { return col(a,"3.1-beskriv-tiltaget"); }
function getYear(a) { return col(a,"3.3c-hvornår-100%"); }

function typeBadgeClass(t) {
  if (!t) return "badge-status";
  const l = t.toLowerCase();
  if (l.includes("tilpasning")) return "badge-tilpasning";
  if (l.includes("reduktion")) return "badge-reduktion";
  if (l.includes("begge")) return "badge-begge";
  return "badge-status";
}

function renderActions() {
  const search = (document.getElementById("search-input").value || "").toLowerCase();
  const f = activeFilters;
  const filtered = actions.filter(a => {
    const s = !search || getTitel(a).toLowerCase().includes(search) ||
      getMuni(a).toLowerCase().includes(search) || getDesc(a).toLowerCase().includes(search);
    return s &&
      (!f.type.length        || f.type.includes(getType(a))) &&
      (!f.status.length      || f.status.includes(getStatus(a))) &&
      (!f.prioritet.length   || f.prioritet.includes(getPri(a))) &&
      (!f.sektor.length      || f.sektor.includes(getSektor(a))) &&
      (!f.klimafarer.length  || f.klimafarer.includes(getFare(a))) &&
      (!f.municipality.length|| f.municipality.includes(getMuni(a)));
  });

  document.getElementById("results-count").textContent = `${filtered.length} tiltag`;
  const grid = document.getElementById("actions-grid");
  if (!filtered.length) { grid.innerHTML = '<div class="no-results">Ingen tiltag matcher de valgte filtre.</div>'; return; }

  grid.innerHTML = filtered.map((a,i) => {
    const desc = getDesc(a);
    return `<div class="action-card" onclick="openModal(${actions.indexOf(a)})">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
        <div>
          <h3>${getTitel(a) || "(uden titel)"}</h3>
          <div class="municipality">${getMuni(a)}</div>
          <div class="badges">
            <span class="badge ${typeBadgeClass(getType(a))}">${getType(a)||"—"}</span>
            ${getStatus(a)?`<span class="badge badge-status">${getStatus(a)}</span>`:""}
            ${getPri(a)==="Ja"?`<span class="badge badge-prioritet">Prioriteret</span>`:""}
          </div>
        </div>
        <div style="font-size:12px;color:#aaa;white-space:nowrap;padding-top:2px">${getYear(a)}</div>
      </div>
      ${desc?`<p style="font-size:13px;color:#666;margin-top:10px;line-height:1.5">${desc.slice(0,180)}${desc.length>180?"…":""}</p>`:""}
    </div>`;
  }).join("");
}

function d(label, val) {
  if (!val) return "";
  return `<div class="detail-item"><div class="label">${label}</div><div class="value">${val}</div></div>`;
}
function df(label, val) {
  if (!val) return "";
  return `<div class="detail-long detail-full"><div class="label">${label}</div><div class="value">${val}</div></div>`;
}

function openModal(idx) {
  const a = actions[idx];
  const muni = getMuni(a);
  const m = municipalities.find(x => (x.Municipality||x.municipality||"") === muni) || {};

  const muniFields = [
    ["1.12-politisk-opbakning","Politisk opbakning"],
    ["1.13-ledelse-fokus","Ledelse fokus"],
    ["1.7-kommunal-finansiering","Finansiering"],
    ["1.18-kompetencer-reduktion","Kompetencer (reduktion)"],
    ["1.19-kompetencer-tilpasning","Kompetencer (tilpasning)"],
    ["1.7-kommunal-finansiering_beløb-tid","Finansieringsdetaljer"],
  ];

  const muniRows = muniFields.map(([k,l]) => m[k] ? `<div style="margin-bottom:8px"><div class="label">${l}</div><div class="value" style="font-size:13px">${m[k]}</div></div>` : "").join("");

  document.getElementById("modal-content").innerHTML = `
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">Luk ✕</button>
    <h2>${getTitel(a)||"(uden titel)"}</h2>
    <div class="modal-sub">${muni} &middot; ${getType(a)||""}</div>
    <div class="badges" style="margin-bottom:1rem">
      <span class="badge ${typeBadgeClass(getType(a))}">${getType(a)||""}</span>
      ${getStatus(a)?`<span class="badge badge-status">${getStatus(a)}</span>`:""}
      ${getPri(a)==="Ja"?`<span class="badge badge-prioritet">Prioriteret</span>`:""}
    </div>
    <div class="section-title">Om tiltaget</div>
    <div class="detail-grid">
      ${df("Beskrivelse", getDesc(a))}
      ${d("Tiltagstype", col(a,"3.7-tiltagstype_u"))}
      ${d("Rolle", col(a,"3.8-rolle_u"))}
      ${d("Sektor", getSektor(a))}
      ${d("Klimafarer", getFare(a))}
      ${d("Forventet afslutning", getYear(a))}
    </div>
    ${col(a,"3.3d-status_u")?`<div style="margin-top:8px">${df("Statusbeskrivelse",col(a,"3.3d-status_u"))}</div>`:""}

    <div class="section-title">Forventede resultater</div>
    <div class="detail-grid">
      ${df("Forventet impact", col(a,"3.9-impact-forventet"))}
      ${df("Forventet outcome", col(a,"3.9-outcome-forventet"))}
      ${df("Forventet output", col(a,"3.9-output-forventet"))}
    </div>

    <div class="section-title">Foreløbige resultater</div>
    <div class="detail-grid">
      ${df("Foreløbig impact", col(a,"3.10-impact-foreløbig"))}
      ${df("Foreløbig outcome", col(a,"3.10-outcome-foreløbig"))}
      ${df("Foreløbig output", col(a,"3.10-output-foreløbig"))}
    </div>

    <div class="section-title">Opfølgning og barrierer</div>
    <div class="detail-grid">
      ${df("Opfølgningsprocedure", col(a,"3.11-opfølgning"))}
      ${df("Barrierer", col(a,"3.12-barrierer_u"))}
      ${df("Yderligere bemærkninger", col(a,"3.13-hvad_ellers"))}
    </div>

    ${muniRows ? `<div class="section-title">Om kommunen</div><div class="muni-section">${muniRows}</div>` : ""}
  `;
  document.getElementById("modal-overlay").classList.add("open");
}

function maybeClose(e) {
  if (e.target === document.getElementById("modal-overlay") ||
      e.target.classList.contains("modal-wrap")) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
}
</script>
</body>
</html>
